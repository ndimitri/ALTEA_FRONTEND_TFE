<div class="flex h-screen">
  <!-- Panneau gauche — caché sur mobile -->
  <div class="hidden md:flex flex-1 items-center justify-center"
       style="background: linear-gradient(135deg, #0D3B66, #1F5C8B)">
    <div class="text-white text-center">
      <mat-icon class="!text-[72px] !w-[72px] !h-[72px] text-primary-lighter">healing</mat-icon>
      <h1 class="text-5xl font-bold tracking-[6px] my-4">ALTEA</h1>
      <p class="text-base opacity-80 max-w-[260px]">Plateforme d'aide aux soins à domicile</p>
    </div>
  </div>

  <!-- Panneau droit -->
  <div class="flex-1 flex items-center justify-center bg-surface p-6">
    <mat-card class="w-full max-w-[420px] p-4">
      <mat-card-header>
        <mat-card-title>Connexion</mat-card-title>
        <mat-card-subtitle>Accédez à votre espace professionnel</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="w-full mb-3">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" placeholder="vous@exemple.be">
            <mat-icon matSuffix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email requis</mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Email invalide</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full mb-3">
            <mat-label>Mot de passe</mat-label>
            <input matInput [type]="showPwd ? 'text' : 'password'" formControlName="password">
            <button mat-icon-button matSuffix type="button" (click)="showPwd = !showPwd">
              <mat-icon>{{ showPwd ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Mot de passe requis
            </mat-error>
          </mat-form-field>

          <div
              class="flex items-center gap-2 text-red-700 bg-red-50 px-3 py-2 rounded-md mb-3 text-sm"
              *ngIf="errorMessage">
            <mat-icon>error</mat-icon>
            {{ errorMessage }}
          </div>

          <button mat-raised-button color="primary" type="submit"
                  class="w-full mt-2 !h-11" [disabled]="loading || loginForm.invalid">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">Se connecter</span>
          </button>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <p class="text-center w-full">Pas encore de compte ? <a
            routerLink="/register">S'inscrire</a></p>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
